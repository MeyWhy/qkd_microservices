# Launch order:
#   1. Redis          (already running)
#   2. node_runner    (launches QKDLs, KME, nodes below)
#   3. Celery workers (separate terminal  see commands below)
#
# Celery worker commands (run from project root):
#   # qubit_send pool  handles batch transmission (scale up for throughput)
#   celery -A workers.celery_config worker --queues=qubit_send --concurrency=4 --loglevel=info -n qubit@%h
#
#   # sifting pool  chord callbacks (1 worker is enough)
#   celery -A workers.celery_config worker --queues=sifting --concurrency=1 --loglevel=info -n sifting@%h
#
# KME: node_runner --with-kme injects QKDL_URLS automatically.
# Alternatively start manually:
#   QKDL_URLS=http://localhost:8003,http://localhost:8013,http://localhost:8023 uvicorn kme.main:app --port 8000

kme:
  url: "http://localhost:8000"
  key_ttl_seconds: 300

qkdl:
  url: "http://localhost:8003"   # default fallback for single-pair setups

nodes:

  # Pair 1: alice-1 <-> bob-1  QKDL :8003
  - label:   alice-1
    role:    sender
    module:  nodes.alice.main
    port:    8001
    env:
      ALICE_LABEL: alice-1
      ALICE_URL:   "http://localhost:8001"
      BATCH_SIZE:  "10"
      QKDL_URL:    "http://localhost:8003"

  - label:   bob-1
    role:    receiver
    module:  nodes.bob.main
    port:    8002
    env:
      BOB_LABEL: bob-1
      BOB_URL:   "http://localhost:8002"
      QKDL_URL:  "http://localhost:8003"

  # Pair 2: alice-2 <-> bob-2  QKDL :8013
  - label:   alice-2
    role:    sender
    module:  nodes.alice.main
    port:    8102
    env:
      ALICE_LABEL: alice-2
      ALICE_URL:   "http://localhost:8102"
      BATCH_SIZE:  "10"
      QKDL_URL:    "http://localhost:8013"

  - label:   bob-2
    role:    receiver
    module:  nodes.bob.main
    port:    8202
    env:
      BOB_LABEL: bob-2
      BOB_URL:   "http://localhost:8202"
      QKDL_URL:  "http://localhost:8013"

  # Pair 3: alice-3 <-> bob-3  QKDL :8023
  - label:   alice-3
    role:    sender
    module:  nodes.alice.main
    port:    8103
    env:
      ALICE_LABEL: alice-3
      ALICE_URL:   "http://localhost:8103"
      QKDL_URL:    "http://localhost:8023"

  - label:   bob-3
    role:    receiver
    module:  nodes.bob.main
    port:    8203
    env:
      BOB_LABEL: bob-3
      BOB_URL:   "http://localhost:8203"
      QKDL_URL:  "http://localhost:8023"

  # Eve  one instance serves all pairs (role=monitor)
  # Start an intercepted session from alice-1:
  #   POST http://localhost:8001/start?receiver_label=bob-1&interceptor_label=eve-1
  - label:   eve-1
    role:    monitor
    module:  nodes.eve.main
    port:    8010
    env:
      EVE_LABEL: eve-1
      EVE_URL:   "http://localhost:8010"

  # Adding a new pair:
  #   1. New QKDL port   (8033, 8043, ...)
  #   2. Unique alice/bob ports
  #   3. node_runner picks up the new QKDL_URL automatically
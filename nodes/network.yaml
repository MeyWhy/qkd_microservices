# nodes/network.yaml  — v0.8.0
#
# Each alice/bob pair declares its own QKDL_URL so that:
#   - KME initialises the session on the right QKDL instance
#   - Alice sends batches to that same instance
#   - Bob polls that same instance
#
# node_runner reads the unique QKDL ports and auto-launches one
# qunetsim_service process per port before starting the nodes.
#
# KME must know the full pool — pass QKDL_URLS when starting it:
#   QKDL_URLS=http://localhost:8003,http://localhost:8013 python kme/main.py

kme:
  url: "http://localhost:8000"
  key_ttl_seconds: 300

qkdl:
  url: "http://localhost:8003"   # default fallback for single-pair setups

nodes:

  # ── Pair 1: alice-1 ↔ bob-1  ─────────────────────────────────────────────
  - label:   alice-1
    role:    sender
    module:  nodes.alice.main
    port:    8001
    env:
      ALICE_LABEL: alice-1
      ALICE_URL:   "http://localhost:8001"
      BATCH_SIZE:  "10"
      QKDL_URL:    "http://localhost:8003"

  - label:   bob-1
    role:    receiver
    module:  nodes.bob.main
    port:    8002
    env:
      BOB_LABEL: bob-1
      BOB_URL:   "http://localhost:8002"
      QKDL_URL:  "http://localhost:8003"

  # ── Pair 2: alice-2 ↔ bob-2  ─────────────────────────────────────────────
  - label:   alice-2
    role:    sender
    module:  nodes.alice.main
    port:    8102
    env:
      ALICE_LABEL: alice-2
      ALICE_URL:   "http://localhost:8102"
      BATCH_SIZE:  "10"
      QKDL_URL:    "http://localhost:8013"

  - label:   bob-2
    role:    receiver
    module:  nodes.bob.main
    port:    8202
    env:
      BOB_LABEL: bob-2
      BOB_URL:   "http://localhost:8202"
      QKDL_URL:  "http://localhost:8013"

  # ── Add more pairs below ──────────────────────────────────────────────────
  # Each new pair needs:
  #   1. A new QKDL port (8023, 8033, ...)
  #   2. Unique alice/bob ports (8103/8203, 8104/8204, ...)
  #   3. Add the new port to QKDL_URLS when starting KME
  #
  - label:   alice-3
    role:    sender
    module:  nodes.alice.main
    port:    8103
    env:
      ALICE_LABEL: alice-3
      ALICE_URL:   "http://localhost:8103"
      QKDL_URL:    "http://localhost:8023"
  
  - label:   bob-3
    role:    receiver
    module:  nodes.bob.main
    port:    8203
    env:
      BOB_LABEL: bob-3
      BOB_URL:   "http://localhost:8203"
      QKDL_URL:  "http://localhost:8023"